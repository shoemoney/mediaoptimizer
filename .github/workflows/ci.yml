name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg and shellcheck
        run: sudo apt-get update && sudo apt-get install -y ffmpeg shellcheck

      - name: Run test suite
        run: bash scripts/test.sh

      - name: Run shellcheck
        run: shellcheck --severity=warning scripts/*.sh *.sh

      - name: Run e2e smoke test
        run: bash scripts/test-e2e.sh
